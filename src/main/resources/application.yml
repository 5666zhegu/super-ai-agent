spring:
  application:
    name: super-ai-agent
  profiles:
    active: local
  # 库连接在 profile 或环境中提供 db.url / db.username / db.password
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}
  ai:
    dashscope:
      api-key: ${spring.ai.dashscope.api-key}
      chat:
        options:
          model: qwen-plus
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        max-document-batch-size: 10000
        initialize-schema: true






server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.geek.superaiagent.controller
mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除字段名(deleted为实体类属性名称)
      logic-delete-value: 1 # 逻辑已删除值。可选，默认值为 1
      logic-not-delete-value: 0 # 逻辑未删除值。可选，默认值为 0
knife4j:
  enable: true
  setting:
    language: zh_cn
logging:
  level:
    com.geek.superaiagent.advisor.MyLoggerAdvisor: INFO
    org.apache.ibatis: info

# SearchAPI.io（百度等引擎），密钥勿提交仓库：可用环境变量 SEARCHAPI_API_KEY
searchapi:
  api-key: ${searchapi.api-key}


